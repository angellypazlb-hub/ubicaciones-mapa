<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mapa de Ubicaciones</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100%; }

        #popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 24px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            width: 280px;
        }
        #popup h3 {
            margin-bottom: 12px;
            color: #1A5276;
        }
        #popup input {
            width: 100%;
            padding: 8px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }
        #popup button {
            width: 100%;
            padding: 10px;
            background: #1A5276;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        #popup button:hover { background: #154360; }
        #cancelar {
            margin-top: 8px;
            background: #ccc;
            color: #333;
        }
        #cancelar:hover { background: #bbb; }
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 999;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div id="overlay"></div>
<div id="popup">
    <h3>Nueva ubicación</h3>
    <input type="text" id="nombreInput" placeholder="Nombre de la ubicación"/>
    <button onclick="guardar()">Guardar</button>
    <button id="cancelar" onclick="cerrarPopup()">Cancelar</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([2.4448, -76.6147], 13); // Popayán

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    let latitudSeleccionada, longitudSeleccionada;

    // Cargar ubicaciones guardadas al iniciar
    fetch('/ubicaciones')
        .then(res => res.json())
        .then(data => {
            data.forEach(u => agregarMarcador(u));
        });

    // Click en el mapa
    map.on('click', function(e) {
        latitudSeleccionada = e.latlng.lat;
        longitudSeleccionada = e.latlng.lng;
        document.getElementById('nombreInput').value = '';
        document.getElementById('popup').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    });

    function guardar() {
        const nombre = document.getElementById('nombreInput').value.trim();
        if (!nombre) {
            alert('Por favor escribe un nombre.');
            return;
        }

        fetch('/ubicaciones', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                nombre: nombre,
                latitud: latitudSeleccionada,
                longitud: longitudSeleccionada
            })
        })
        .then(res => res.json())
        .then(u => {
            agregarMarcador(u);
            cerrarPopup();
        });
    }

    function agregarMarcador(u) {
        L.marker([u.latitud, u.longitud])
            .addTo(map)
            .bindPopup(`<b>${u.nombre}</b><br>Lat: ${u.latitud.toFixed(4)}<br>Lng: ${u.longitud.toFixed(4)}`)
            .openPopup();
    }

    function cerrarPopup() {
        document.getElementById('popup').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }
</script>
</body>
</html>
